<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>日程・空き確認 | TravelNest Demo</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <script src="data/master.js"></script>
  <script src="js/app.js"></script>
  <script src="js/layout.js"></script>

  <div class="page-wrap" style="margin-top:80px;max-width:960px">
    <div class="breadcrumb">
      <a href="search.html">検索結果</a>
      <span class="sep">›</span>
      <a id="hotel-detail-link" href="#">ホテル詳細</a>
      <span class="sep">›</span>
      <span>日程・空き確認</span>
    </div>

    <div id="hotel-info-banner" class="alert alert-info" style="margin-bottom:20px"></div>

    <div class="date-select-grid">

      <!-- ① 日程・人数入力（左） -->
      <div class="form-section">
        <h3>① 日程・人数を入力</h3>

        <div class="form-group" id="ci-group" style="margin-bottom:12px">
          <label>チェックイン * <span style="font-size:11px;color:var(--warn)">（翌日以降）</span></label>
          <div class="date-input-wrap">
            <input type="text" id="ds-checkin" placeholder="yyyy/mm/dd" maxlength="10"
              oninput="autoFormatDate(this);validateCheckin()">
            <div class="dp-btn-wrap" onclick="openDatePicker('ds-checkin')">📅
              <input type="date" id="ds-checkin-dp" tabindex="-1"
                onchange="syncFromPicker('ds-checkin');validateCheckin()">
            </div>
          </div>
          <span class="error-msg">チェックインは翌日以降のみ指定できます</span>
        </div>

        <div class="form-group" id="co-group" style="margin-bottom:12px">
          <label>チェックアウト *</label>
          <div class="date-input-wrap">
            <input type="text" id="ds-checkout" placeholder="yyyy/mm/dd" maxlength="10"
              oninput="autoFormatDate(this);validateDates()">
            <div class="dp-btn-wrap" onclick="openDatePicker('ds-checkout')">📅
              <input type="date" id="ds-checkout-dp" tabindex="-1"
                onchange="syncFromPicker('ds-checkout');validateDates()">
            </div>
          </div>
          <span class="error-msg">チェックアウトはチェックイン翌日以降です</span>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
          <div class="form-group">
            <label>人数</label>
            <select id="ds-guests">
              <option value="1">1名</option>
              <option value="2" selected>2名</option>
              <option value="3">3名</option>
              <option value="4">4名</option>
            </select>
          </div>
          <div class="form-group">
            <label>部屋数</label>
            <select id="ds-rooms">
              <option value="1" selected>1室</option>
              <option value="2">2室</option>
              <option value="3">3室</option>
            </select>
          </div>
        </div>

        <div class="alert alert-warn" style="margin-bottom:16px;font-size:13px">
          ⚠️ チェックインは予約日の翌日以降のみ選択できます
        </div>

        <button class="btn btn-primary" style="width:100%;font-size:15px;padding:12px" onclick="checkAvailability()">
          空きを確認 →
        </button>
      </div>

      <!-- ② 空き確認結果（右） -->
      <div>
        <div class="form-section">
          <h3>② 空き確認結果</h3>
          <div id="avail-placeholder" class="alert alert-info" style="margin-bottom:0">
            左の日程を入力して「空きを確認」ボタンを押してください。
          </div>
          <div id="avail-result" class="hidden"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    let currentHotel = null;
    let nightsCount  = 0;

    document.addEventListener("DOMContentLoaded", () => {
      buildPage({ title: "日程・空き確認" });
      if (!App.requireLogin()) return;

      const params  = new URLSearchParams(window.location.search);
      const hotelId = params.get("hotelId") || App.loadSearchParams().hotelId;
      if (!hotelId) { window.location.href = "search.html"; return; }

      currentHotel = App.getHotelById(hotelId);
      if (!currentHotel) { window.location.href = "search.html"; return; }

      document.getElementById("hotel-info-banner").innerHTML =
        `🏨 <strong>${currentHotel.name}</strong> &nbsp;📍 ${App.regionName(currentHotel.region)} &nbsp; ${App.starsHtml(currentHotel.stars)}`;
      document.getElementById("hotel-detail-link").href = `hotel.html?id=${currentHotel.id}`;

      const sp = App.loadSearchParams();

      // 日付を反映（テキスト + ピッカー両方）
      if (sp.checkin) {
        document.getElementById("ds-checkin").value    = sp.checkin.replace(/-/g, "/");
        document.getElementById("ds-checkin-dp").value = sp.checkin;
      }
      if (sp.checkout) {
        document.getElementById("ds-checkout").value    = sp.checkout.replace(/-/g, "/");
        document.getElementById("ds-checkout-dp").value = sp.checkout;
      }
      document.getElementById("ds-guests").value = sp.guests || "2";

      // 日程が既に指定されている場合は自動で空き確認を実行
      if (sp.checkin && sp.checkout) {
        setTimeout(() => checkAvailability(false), 100);
      }
    });

    function validateCheckin() {
      const ci      = App.parseDateStr(document.getElementById("ds-checkin").value);
      const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1); tomorrow.setHours(0,0,0,0);
      const ciG     = document.getElementById("ci-group");

      if (ci && new Date(ci + "T00:00:00") < tomorrow) {
        ciG.classList.add("has-error");
      } else {
        ciG.classList.remove("has-error");
        if (ci) {
          const coDate   = new Date(ci + "T00:00:00"); coDate.setDate(coDate.getDate() + 1);
          const coParsed = App.parseDateStr(document.getElementById("ds-checkout").value);
          if (!coParsed || coParsed <= ci) {
            const fmt = App.fmtDate(coDate);
            document.getElementById("ds-checkout").value    = fmt.replace(/-/g, "/");
            document.getElementById("ds-checkout-dp").value = fmt;
          }
        }
      }
    }

    function validateDates() {
      const ci  = App.parseDateStr(document.getElementById("ds-checkin").value);
      const co  = App.parseDateStr(document.getElementById("ds-checkout").value);
      const coG = document.getElementById("co-group");
      if (ci && co && co <= ci) coG.classList.add("has-error");
      else coG.classList.remove("has-error");
    }

    function checkAvailability(withLoading = true) {
      const ci = App.parseDateStr(document.getElementById("ds-checkin").value);
      const co = App.parseDateStr(document.getElementById("ds-checkout").value);
      const g  = +document.getElementById("ds-guests").value;
      const r  = +document.getElementById("ds-rooms").value;

      if (!ci || !co) { if (withLoading) App.showToast("日程を入力してください", "error"); return; }
      const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1); tomorrow.setHours(0,0,0,0);
      if (new Date(ci + "T00:00:00") < tomorrow) { if (withLoading) App.showToast("チェックインは翌日以降のみ指定できます", "error"); return; }
      if (co <= ci) { if (withLoading) App.showToast("チェックアウトはチェックイン翌日以降です", "error"); return; }

      const doRender = () => {
        nightsCount = App.calcNights(ci, co);
        const avail = App.checkAvailability(currentHotel.id, ci, co);

        document.getElementById("avail-placeholder").classList.add("hidden");
        const result = document.getElementById("avail-result");
        result.classList.remove("hidden");

        const DOW_JP = ["日","月","火","水","木","金","土"];

        const blockedHtml = avail.blockedDays.length > 0
          ? `<div class="alert alert-warn" style="margin-bottom:12px;font-size:13px">
               ⚠️ 以下の日程が満室のため、この期間は予約できません。<br>
               ${avail.blockedDays.map(d => {
                 const dt = new Date(d + "T00:00:00");
                 return `<strong>${dt.getMonth()+1}月${dt.getDate()}日（${DOW_JP[dt.getDay()]}）</strong>`;
               }).join("、")}
             </div>`
          : `<div class="alert alert-success" style="margin-bottom:12px;font-size:13px">
               ✅ ${App.fmtDateJP(ci)} → ${App.fmtDateJP(co)}<br>
               ${nightsCount}泊 / 大人${g}名
             </div>`;

        result.innerHTML = `
          ${blockedHtml}
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead>
                <tr>
                  <th style="background:var(--accent);color:white;padding:8px 10px;text-align:left">部屋タイプ</th>
                  <th style="background:var(--accent);color:white;padding:8px 10px;text-align:right">1泊</th>
                  <th style="background:var(--accent);color:white;padding:8px 10px;text-align:right">合計</th>
                  <th style="background:var(--accent);color:white;padding:8px 10px;text-align:center">空室</th>
                  <th style="background:var(--accent);color:white;padding:8px 10px"></th>
                </tr>
              </thead>
              <tbody>
                ${avail.rooms.map((rm, i) => {
                  const total = rm.price * nightsCount * r;
                  return `
                    <tr style="background:${i%2===0?'white':'var(--gray-lt)'}">
                      <td style="padding:8px 10px;font-weight:600;font-size:12px">${rm.type}</td>
                      <td style="padding:8px 10px;text-align:right;color:var(--primary);font-weight:700">${App.fmtPrice(rm.price)}</td>
                      <td style="padding:8px 10px;text-align:right;font-weight:700">${App.fmtPrice(total)}</td>
                      <td style="padding:8px 10px;text-align:center">
                        <span class="badge ${rm.available?'badge-success':'badge-danger'}">${rm.available?'空あり':'満室'}</span>
                      </td>
                      <td style="padding:8px 10px;text-align:center">
                        ${rm.available
                          ? `<button class="btn btn-primary btn-sm" onclick="selectRoom('${rm.type.replace(/'/g,"\\'")}',${rm.price},${total},'${ci}','${co}',${g},${r})">予　約</button>`
                          : `<span style="font-size:11px;color:var(--gray)">満室</span>`
                        }
                      </td>
                    </tr>`;
                }).join("")}
              </tbody>
            </table>
          </div>`;

        const sp = App.loadSearchParams();
        sp.hotelId = currentHotel.id;
        sp.checkin = ci; sp.checkout = co;
        sp.guests = g;   sp.rooms = r;
        App.saveSearchParams(sp);
      };

      if (withLoading) {
        App.showLoading("空きを確認中...");
        setTimeout(() => { App.hideLoading(); doRender(); }, 3000 + Math.random() * 2000);
      } else {
        doRender();
      }
    }

    function selectRoom(type, price, total, ci, co, g, r) {
      const sp = App.loadSearchParams();
      sp.roomType   = type;
      sp.roomPrice  = price;
      sp.totalPrice = total;
      sp.checkin    = ci;
      sp.checkout   = co;
      sp.guests     = g;
      sp.rooms      = r;
      App.saveSearchParams(sp);
      window.location.href = "booking.html";
    }
  </script>
</body>
</html>
